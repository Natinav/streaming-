<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrigenTheo Live Audio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <main class="audio-receiver-card">
            
            <div class="status-header">
                <div class="live-badge animate-pulse">LIVE AUDIO ACTIVE</div>
                <h2>Natnael's Classroom</h2>
                <p class="sub-text">⚡ Low-Data Radio Mode (~40Kbps)</p>
            </div>

            <!-- Custom App-Style Audio Control Button -->
            <div class="player-wrapper">
                <button id="play-btn" class="control-button">▶ TAP TO LISTEN</button>
                <p id="player-status" class="status-indicator">Player Stopped</p>
            </div>

            <div class="instruction-box">
                <p>💡 <strong>Listening Tip:</strong> If the audio drops or falls behind, simply tap the button twice to stop and restart. This connects you straight back to the live moment!</p>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
